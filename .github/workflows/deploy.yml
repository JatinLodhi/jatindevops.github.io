name: Deploy Next.js Portfolio → GitHub Pages

# ── Triggers ──────────────────────────────────────────────────
on:
  push:
    branches: [main]          # auto-deploy on every push to main
  workflow_dispatch:           # allow manual trigger from GitHub UI

# ── Permissions required by actions/deploy-pages ──────────────
permissions:
  contents: read
  pages: write
  id-token: write

# ── One deployment at a time ──────────────────────────────────
concurrency:
  group: pages
  cancel-in-progress: true

# ══════════════════════════════════════════════════════════════
jobs:

  # ── Job 1: Build ────────────────────────────────────────────
  build:
    name: Build (Next.js → static export)
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js with npm cache
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Print build context for debugging
      - name: Show build context
        run: |
          echo "================================================"
          echo "  Next.js Portfolio — Build"
          echo "================================================"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Trigger : ${{ github.event_name }}"
          echo "  Actor   : ${{ github.actor }}"
          echo "  Repo    : ${{ github.repository }}"
          echo "================================================"
          node --version
          npm --version

      # 4. Install dependencies (clean install from package-lock.json)
      - name: Install dependencies
        run: npm ci

      # 5. Run ESLint (non-blocking — warnings only, don't fail build)
      - name: Lint (warnings only)
        run: npm run lint || true

      # 6. Determine basePath
      #    • If repo name == owner.github.io  → root site → basePath=""
      #    • Otherwise                         → project page → basePath="/repo-name"
      #    • Custom domain users: set BASE_PATH="" in repo Variables to override.
      - name: Determine basePath
        id: basepath
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"

          # Check if this repo is the root GitHub Pages site
          if [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
            BASE_PATH=""
            echo "Root GitHub Pages site — basePath is empty"
          else
            BASE_PATH="/${REPO_NAME}"
            echo "Project page — basePath: ${BASE_PATH}"
          fi

          # Allow repository Variable BASE_PATH to override detection
          if [ -n "${{ vars.BASE_PATH }}" ]; then
            BASE_PATH="${{ vars.BASE_PATH }}"
            echo "Overridden by repo variable — basePath: ${BASE_PATH}"
          fi

          echo "base_path=${BASE_PATH}" >> "$GITHUB_OUTPUT"
          echo "Final basePath: '${BASE_PATH}'"

      # 7. Build Next.js static export
      #    output goes to ./out  (set by output:'export' in next.config.ts)
      - name: Build Next.js (static export)
        run: npm run build
        env:
          NODE_ENV: production
          BASE_PATH: ${{ steps.basepath.outputs.base_path }}

      # 8. Add .nojekyll so GitHub Pages doesn't try to process _next/ with Jekyll
      - name: Add .nojekyll
        run: touch out/.nojekyll

      # 9. Show what was built
      - name: Show build output
        run: |
          echo "── Build output (./out) ──────────────────────"
          find out -type f | sort
          echo ""
          echo "── Total size ────────────────────────────────"
          du -sh out/

      # 10. Configure GitHub Pages (sets GITHUB_PAGES_URL etc.)
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      # 11. Upload the ./out directory as the Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out


  # ── Job 2: Deploy ───────────────────────────────────────────
  deploy:
    name: Deploy → GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    # Only deploy on pushes to main (not on PRs or other branches)
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print live URL
        run: |
          echo ""
          echo "================================================"
          echo "  ✅  Deployment complete!"
          echo "  🌐  ${{ steps.deployment.outputs.page_url }}"
          echo "================================================"
